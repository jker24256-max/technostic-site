<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Order Confirmed — Technostic Group</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:Orbitron,system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:0;background:#04060b;color:#eaf6ff;padding:28px}
.container{max-width:800px;margin:auto}
.card{background:#071027;border:1px solid rgba(255,255,255,0.06);padding:24px;border-radius:14px}
h1{font-size:28px;margin:0 0 12px}
.sub{color:#9fb4c9;margin-bottom:18px}
.detail{background:rgba(255,255,255,0.02);padding:12px;border-radius:10px;margin-bottom:10px}
.button{display:inline-block;padding:10px 14px;border-radius:10px;background:#00c0ff;color:#041226;text-decoration:none;font-weight:700}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>Order placed</h1>
    <div class="sub">Thank you — your order request has been sent. We'll contact you shortly.</div>
    <div id="order-details"></div>
    <div style="margin-top:16px">
      <a href="services.html" class="button">Back to services</a>
      <a href="index.html" style="margin-left:12px;color:#9fb4c9;text-decoration:none">Home</a>
    </div>
  </div>
</div>
<script>
  (function(){
    // load order data
    let data = null;
    try{ data = JSON.parse(localStorage.getItem('last_order') || 'null'); }catch(e){ data = null; }
    const el = document.getElementById('order-details');
    if(!data){ el.innerHTML = '<div class="detail">No order information found. If you just placed an order, try refreshing this page.</div>'; return; }
    const d = [];
    d.push('<div class="detail"><strong>Name:</strong> ' + (data.customer_name||'') + '</div>');
    d.push('<div class="detail"><strong>Email:</strong> ' + (data.customer_email||'') + '</div>');
    d.push('<div class="detail"><strong>Company:</strong> ' + (data.customer_company||'N/A') + '</div>');
    d.push('<div class="detail"><strong>Phone:</strong> ' + (data.customer_phone||'N/A') + '</div>');
    d.push('<div class="detail"><strong>Order total:</strong> ' + (data.order_total||'') + '</div>');
    d.push('<div class="detail"><strong>Ordered items:</strong><pre style="white-space:pre-wrap;margin:8px 0 0;color:#cfefff">'+(data.order_details||'')+'</pre></div>');
    if(data.customer_notes){ d.push('<div class="detail"><strong>Notes:</strong><div style="margin-top:6px;color:#cfefff">'+(data.customer_notes||'')+'</div></div>'); }
    el.innerHTML = d.join('\n');

    // clear stored last_order after showing to user
    try{ localStorage.removeItem('last_order'); }catch(e){}
  })();
</script>
</body>
</html>
