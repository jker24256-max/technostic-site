<!doctype html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Services — Technostic Group</title>

<link rel="icon" type="image/png" href="assets/favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#04060b;
    --text:#eaf6ff;
    --muted:#9fb4c9;
    --card:#071027;
    --border:rgba(255,255,255,0.08);

    --accent1:#00c0ff;
    --accent2:#e53935;

    color-scheme:dark;
}

html[data-theme="light"]{
    --bg:#f5f5f5;
    --text:#041226;
    --muted:#64748b;
    --card:#ffffff;
    --border:rgba(0,0,0,0.08);

    color-scheme:light;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);

    font-family:Orbitron,sans-serif;

    padding:32px;

    transition:
        background 0.35s ease,
        color 0.35s ease;
}

/* CONTAINER */

.container{
    max-width:1100px;
    margin:auto;
}

/* HEADER */

header{
    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:36px;
}

.title-group h1{
    font-size:56px;
    margin-bottom:12px;
}

.title-group p{
    color:var(--muted);
}

/* BUTTONS */

.top-actions{
    display:flex;
    gap:10px;
}

.button{
    height:44px;

    padding:0 20px;

    border-radius:14px;

    border:1px solid var(--border);

    background:transparent;

    color:var(--text);

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;

    text-decoration:none;

    font-family:Orbitron;

    transition:0.3s ease;
}

.button:hover{
    transform:translateY(-2px);
}

/* SERVICE CARDS */

.service-box{

    background:var(--card);

    border:1px solid var(--border);

    border-radius:20px;

    padding:26px;

    margin-bottom:24px;

    transition:
        background 0.35s ease,
        border-color 0.35s ease,
        box-shadow 0.35s ease;
}

.service-box:hover{
    box-shadow:
        0 10px 30px rgba(0,0,0,0.25);
}

.service-box h2{
    margin-bottom:24px;
    font-size:38px;
}

/* PLAN BUTTONS */

.plan-buttons{
    display:flex;
    gap:18px;
    flex-wrap:wrap;
}

.plan-btn{

    flex:1;

    min-width:180px;

    height:64px;

    border:none;

    border-radius:18px;

    cursor:pointer;

    font-family:Orbitron;

    font-size:16px;

    font-weight:600;

    color:white;

    background:
        linear-gradient(
            135deg,
            var(--accent1),
            var(--accent2)
        );

    box-shadow:
        0 10px 25px rgba(0,0,0,0.25);

    transition:
        transform 0.25s ease,
        box-shadow 0.25s ease;
}

.plan-btn:hover{

    transform:
        translateY(-4px);

    box-shadow:
        0 18px 35px rgba(0,0,0,0.35);
}

/* CONTACT */

.contact{
    margin-top:20px;
    color:var(--muted);
}

.contact a{
    color:var(--accent1);
    text-decoration:none;
}

/* MOBILE */

@media(max-width:900px){

    header{
        flex-direction:column;
        align-items:flex-start;
        gap:20px;
    }

    .title-group h1{
        font-size:42px;
    }

    .service-box h2{
        font-size:28px;
    }

    .plan-buttons{
        flex-direction:column;
    }

    .plan-btn{
        width:100%;
    }
}

</style>

</head>

<body>

<div class="container">

<header>

    <div class="title-group">

        <h1>Services</h1>

        <p>
            Technostic Group — Cybersecurity & Technology
        </p>

    </div>

    <div class="top-actions">

        <a href="index.html" class="button">
            ← Back to home
        </a>

        <button id="theme-toggle" class="button">
        </button>

    </div>

</header>

<!-- HOME SECURITY -->

<div class="service-box">

    <h2>
        Home / Personal Cybersecurity Services
    </h2>

    <div class="plan-buttons">

        <button class="plan-btn" onclick="location.href='starter.html'">
            Starter
        </button>

        <button class="plan-btn" onclick="location.href='standard.html'">
            Standard
        </button>

        <button class="plan-btn" onclick="location.href='premium.html'">
            Premium
        </button>

    </div>

</div>

<!-- BUSINESS SECURITY -->

<div class="service-box">

    <h2>
        Business Cybersecurity Services
    </h2>

    <div class="plan-buttons">

        <button class="plan-btn" onclick="location.href='stb.html'">
            Standard Business
        </button>

        <button class="plan-btn" onclick="location.href='professional.html'">
            Professional
        </button>

        <button class="plan-btn" onclick="location.href='retainer.html'">
            Monthly Retainer
        </button>

    </div>

</div>

<div class="contact">

    Contact:
    <a href="mailto:hacknosticgroup@gmail.com">
        hacknosticgroup@gmail.com
    </a>

</div>

</div>

<script>

(function(){

    const htmlEl = document.documentElement;

    const toggle =
        document.getElementById('theme-toggle');

    const saved =
        localStorage.getItem('theme');

    const prefersDark =
        window.matchMedia &&
        window.matchMedia('(prefers-color-scheme: dark)').matches;

    const initial =
        saved || (prefersDark ? 'dark' : 'light');

    htmlEl.setAttribute('data-theme', initial);

    const sunIcon = `
    ☀️
    `;

    const moonIcon = `
    🌙
    `;

    function updateIcon(theme){

        toggle.innerHTML =
            theme === 'light'
            ? sunIcon
            : moonIcon;
    }

    updateIcon(initial);

    toggle.addEventListener('click', function(){

        const current =
            htmlEl.getAttribute('data-theme');

        const next =
            current === 'light'
            ? 'dark'
            : 'light';

        htmlEl.setAttribute('data-theme', next);

        localStorage.setItem('theme', next);

        updateIcon(next);
    });

})();

</script>

</body>
</html>
