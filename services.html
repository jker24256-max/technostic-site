<style>

:root{
    --bg:#04060b;
    --text:#eaf6ff;
    --muted:#9fb4c9;
    --card:#071027;
    --border:rgba(255,255,255,0.08);

    --accent1:#00c0ff;
    --accent2:#e53935;

    color-scheme:dark;
}

html[data-theme="light"]{
    --bg:#f5f5f5;
    --text:#041226;
    --muted:#64748b;
    --card:#ffffff;
    --border:rgba(0,0,0,0.08);

    color-scheme:light;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);

    font-family:Orbitron,sans-serif;

    padding:32px;

    transition:
        background 0.35s ease,
        color 0.35s ease;
}

/* CONTAINER */

.container{
    max-width:1100px;
    margin:auto;
}

/* HEADER */

header{
    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:36px;
}

.title-group h1{
    font-size:56px;
    margin-bottom:12px;
}

.title-group p{
    color:var(--muted);
}

/* BUTTONS */

.top-actions{
    display:flex;
    gap:10px;
}

.button{
    height:44px;

    padding:0 20px;

    border-radius:14px;

    border:1px solid var(--border);

    background:transparent;

    color:var(--text);

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;

    text-decoration:none;

    font-family:Orbitron;

    transition:0.3s ease;
}

.button:hover{
    transform:translateY(-2px);
}

/* SERVICE CARDS */

.service-box{

    background:var(--card);

    border:1px solid var(--border);

    border-radius:20px;

    padding:26px;

    margin-bottom:24px;

    transition:
        background 0.35s ease,
        border-color 0.35s ease,
        box-shadow 0.35s ease;
}

.service-box:hover{
    box-shadow:
        0 10px 30px rgba(0,0,0,0.25);
}

.service-box h2{
    margin-bottom:24px;
    font-size:38px;
}

/* PLAN BUTTONS */

.plan-buttons{
    display:flex;
    gap:18px;
    flex-wrap:wrap;
}

.plan-btn{

    flex:1;

    min-width:180px;

    height:64px;

    border:none;

    border-radius:18px;

    cursor:pointer;

    font-family:Orbitron;

    font-size:16px;

    font-weight:600;

    color:white;

    background:
        linear-gradient(
            135deg,
            var(--accent1),
            var(--accent2)
        );

    box-shadow:
        0 10px 25px rgba(0,0,0,0.25);

    transition:
        transform 0.25s ease,
        box-shadow 0.25s ease;
}

.plan-btn:hover{

    transform:
        translateY(-4px);

    box-shadow:
        0 18px 35px rgba(0,0,0,0.35);
}

/* CONTACT */

.contact{
    margin-top:20px;
    color:var(--muted);
}

.contact a{
    color:var(--accent1);
    text-decoration:none;
}

/* MOBILE */

@media(max-width:900px){

    header{
        flex-direction:column;
        align-items:flex-start;
        gap:20px;
    }

    .top-actions{
        width:100%;
        flex-direction:column;
    }

    .title-group h1{
        font-size:42px;
    }

    .service-box h2{
        font-size:28px;
    }

    .service-box{
        padding:20px;
    }

    .plan-buttons{
        flex-direction:column;
    }

    .plan-btn{
        width:100%;
    }
}

@media(max-width:560px){

    }

        font-size:30px;
    }

    .service-box h2{
        font-size:24px;
    }

/* =========================
   CYBER GLASSMORPHISM FX
========================= */

body{
    position:relative;
}

/* Mouse glow */

.mouse-glow{

    position:fixed;

    width:420px;
    height:420px;

    border-radius:50%;

    pointer-events:none;

    z-index:0;

    background:
        radial-gradient(
            circle,
            rgba(0,192,255,0.16) 0%,
            rgba(229,57,53,0.10) 30%,
            rgba(0,0,0,0) 75%
        );

    filter:blur(45px);

    transform:
        translate(-50%, -50%);

    transition:
        transform 0.08s linear;

    mix-blend-mode:screen;
}

/* Lift important cards above glow */

.hero-card,
.panel,
.service,
.service-box,
.package-card,
.image-panel,
.member,
.feature{

    position:relative;

    z-index:2;

    overflow:hidden;

    backdrop-filter:blur(14px);

    -webkit-backdrop-filter:blur(14px);

    background:
        linear-gradient(
            135deg,
            rgba(255,255,255,0.06),
            rgba(255,255,255,0.02)
        );

    border:
        1px solid rgba(255,255,255,0.08);

    box-shadow:
        0 10px 35px rgba(0,0,0,0.35),
        inset 0 1px 1px rgba(255,255,255,0.04);

    transition:
        transform 0.35s ease,
        box-shadow 0.35s ease,
        border-color 0.35s ease;
}

/* Floating hover */

.hero-card:hover,
.panel:hover,
.service:hover,
.service-box:hover,
.package-card:hover,
.member:hover,
.feature:hover{

    transform:
        translateY(-6px)
        scale(1.01);

    border-color:
        rgba(0,192,255,0.25);

    box-shadow:
        0 20px 45px rgba(0,0,0,0.45),
        0 0 25px rgba(0,192,255,0.12);
}

/* Glass shine sweep */

.hero-card::before,
.panel::before,
.service::before,
.service-box::before,
.package-card::before,
.member::before,
.feature::before{

    content:"";

    position:absolute;

    top:-120%;
    left:-40%;

    width:60%;
    height:300%;

    background:
        linear-gradient(
            to right,
            rgba(255,255,255,0),
            rgba(255,255,255,0.06),
            rgba(255,255,255,0)
        );

    transform:
        rotate(25deg);

    transition:
        transform 0.8s ease;

    pointer-events:none;
}

.hero-card:hover::before,
.panel:hover::before,
.service:hover::before,
.service-box:hover::before,
.package-card:hover::before,
.member:hover::before,
.feature:hover::before{

    transform:
        rotate(25deg)
        translateX(220%);
}

<script>

(function(){

    const htmlEl = document.documentElement;

    const toggle =
        document.getElementById('theme-toggle');

    const saved =
        localStorage.getItem('theme');

    const prefersDark =
        window.matchMedia &&
        window.matchMedia('(prefers-color-scheme: dark)').matches;

    const initial =
        saved || (prefersDark ? 'dark' : 'light');

    htmlEl.setAttribute('data-theme', initial);

    const sunIcon = `
    ☀️
    `;

    const moonIcon = `
    🌙
    `;

    function updateIcon(theme){

        toggle.innerHTML =
            theme === 'light'
            ? sunIcon
            : moonIcon;
    }

    updateIcon(initial);

    toggle.addEventListener('click', function(){

        const current =
            htmlEl.getAttribute('data-theme');

        const next =
            current === 'light'
            ? 'dark'
            : 'light';

        htmlEl.setAttribute('data-theme', next);

        localStorage.setItem('theme', next);

        updateIcon(next);
    });

})();

</script>
<script>

/* =========================
   SMOOTH SCROLL ANIMATIONS
========================= */

document.documentElement.style.scrollBehavior = "smooth";

/* Elements to animate */

const animatedElements = document.querySelectorAll(
`
.hero-card,
.panel,
.service,
.service-box,
.service-item,
.member,
.feature,
.package-card,
.image-panel,
.content-panel,
.stat,
.plan-btn,
.contact-form,
h1,
h2,
p,
footer
`
);

/* Initial hidden state */

animatedElements.forEach((el, index) => {

    el.style.opacity = "0";
    el.style.transform = "translateY(40px)";
    el.style.filter = "blur(8px)";

    el.style.transition = `
        opacity 0.9s ease,
        transform 0.9s ease,
        filter 0.9s ease
    `;

    /* stagger effect */

    el.style.transitionDelay = `${index * 0.05}s`;
});

/* Observer */

const observer = new IntersectionObserver((entries) => {

    entries.forEach(entry => {

        if(entry.isIntersecting){

            entry.target.style.opacity = "1";
            entry.target.style.transform = "translateY(0)";
            entry.target.style.filter = "blur(0px)";

            observer.unobserve(entry.target);
        }

    });

}, {
    threshold: 0.12
});

/* Observe all */

animatedElements.forEach(el => observer.observe(el));

</script>

<script>
// Cart & custom panel behavior
function getCart(){try{return JSON.parse(localStorage.getItem('tech_cart')||'[]');}catch(e){return []}}
function saveCart(c){localStorage.setItem('tech_cart',JSON.stringify(c));}
function updateCartCount(){const el=document.getElementById('cart-count'); if(el) el.textContent = getCart().length;}
function addToCart(item){const c=getCart(); c.push(item); saveCart(c); updateCartCount();}
updateCartCount();

function showToast(msg, timeout=2500){
    const t = document.getElementById('toast');
    if(!t) return; t.textContent = msg; t.style.display = 'block'; t.style.opacity = '1';
    setTimeout(()=>{ t.style.transition='opacity 300ms'; t.style.opacity='0'; setTimeout(()=>{ t.style.display='none'; t.style.transition=''; },300); }, timeout);
}

document.getElementById('custom-toggle').addEventListener('click', ()=>{
    const panel = document.getElementById('custom-panel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
});

document.getElementById('add-selected').addEventListener('click', ()=>{
    const checks = document.querySelectorAll('#custom-panel input[type=checkbox]:checked');
    if(!checks.length){ showToast('Please select at least one service'); return; }
    checks.forEach(ch => {
        const [name,price] = ch.value.split('|');
        addToCart({name: name.trim(), price: (price||'₹0').trim()});
    });
    showToast('Selected services added to cart');
});

</script>
