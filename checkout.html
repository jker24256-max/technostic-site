<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Checkout — Technostic Group</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/responsive.css">
<style>
:root{--bg:#04060b;--text:#eaf6ff;--muted:#9fb4c9;--card:#071027;--border:rgba(255,255,255,0.08);--accent1:#00c0ff;--accent2:#e53935;color-scheme:dark}
html[data-theme="light"]{--bg:#f5f5f5;--text:#041226;--muted:#64748b;--card:#ffffff;--border:rgba(0,0,0,0.08);color-scheme:light}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:Orbitron,sans-serif;padding:32px}
.container{max-width:1100px;margin:auto}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}
.button{height:44px;padding:0 18px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none;font-family:Orbitron}
.checkout-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px}
.checkout-grid{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:24px}
.checkout-form{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:18px;padding:20px}
.checkout-section{margin-bottom:22px}
.checkout-section h3{margin:0 0 16px;font-size:20px}
.checkout-fields{display:grid;gap:14px;margin:0}
.checkout-field{display:flex;flex-direction:column;gap:8px}
.checkout-field label{color:var(--muted);font-size:13px}
.checkout-field input,
.checkout-field textarea{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:var(--text);font-family:Orbitron;padding:12px 14px;outline:none}
.checkout-field input:focus,
.checkout-field textarea:focus{border-color:rgba(0,192,255,0.75)}
.order-summary{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:18px;padding:20px;display:flex;flex-direction:column;gap:16px}
.summary-header{display:flex;align-items:center;justify-content:space-between;gap:12px}
.summary-header h3{margin:0;font-size:20px}
#summary-count{color:var(--muted);font-size:14px}
.item{display:flex;justify-content:space-between;gap:12px;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.03);margin-bottom:8px}
.item .meta{flex:1}
.item .actions{display:flex;gap:8px;align-items:center}
.total{font-size:20px;font-weight:700;margin-top:12px}
.plan-btn{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:white;border:none;padding:12px 18px;border-radius:12px;cursor:pointer}
.plan-btn:disabled{opacity:.55;cursor:not-allowed}
.plan-btn.full-width{width:100%}
.plan-btn.secondary{background:#444}
#toast{ position:fixed; right:20px; bottom:20px; background:linear-gradient(180deg, rgba(0,0,0,0.6), rgba(0,0,0,0.8)); color:var(--text); padding:10px 14px; border-radius:10px; box-shadow:0 8px 30px rgba(0,0,0,0.6); display:none; z-index:9999; border:1px solid rgba(255,255,255,0.06); }</style>
</head>
<body>
<div id="toast"></div>
<div class="container">
<header>
    <div><strong>Technostic Group</strong><div style="color:var(--muted);font-size:13px">Checkout</div></div>
    <div style="display:flex;gap:12px;align-items:center">
        <a href="services.html" class="button">← Back to services</a>
        <button id="theme-toggle" class="button"></button>
    </div>
</header>

<div class="checkout-card">
    <h2>Your Cart</h2>
    <div class="checkout-grid">
        <div class="checkout-form">
            <section class="checkout-section">
                <h3>Contact information</h3>
                <div class="checkout-fields">
                    <div class="checkout-field">
                        <label for="customer-name">Name</label>
                        <input id="customer-name" type="text" placeholder="Your full name" autocomplete="name" required>
                    </div>
                    <div class="checkout-field">
                        <label for="customer-email">Email</label>
                        <input id="customer-email" type="email" placeholder="Your email" autocomplete="email" required>
                    </div>
                    <div class="checkout-field">
                        <label for="customer-company">Company (optional)</label>
                        <input id="customer-company" type="text" placeholder="Company name" autocomplete="organization">
                    </div>
                    <div class="checkout-field">
                        <label for="customer-phone">Phone (optional)</label>
                        <input id="customer-phone" type="tel" placeholder="Phone number" autocomplete="tel">
                    </div>
                </div>
            </section>

            <section class="checkout-section">
                <h3>Order notes</h3>
                <div class="checkout-field">
                    <label for="customer-notes">Notes</label>
                    <textarea id="customer-notes" rows="4" placeholder="Any additional details or requests"></textarea>
                </div>
            </section>
        </div>

        <aside class="order-summary">
            <div class="summary-header">
                <h3>Order summary</h3>
                <div id="summary-count">0 items</div>
            </div>
            <div id="cart-list"></div>
            <div class="total">Subtotal: <span id="cart-total">₹0</span></div>
            <button id="checkout-btn" class="plan-btn full-width">Place order</button>
            <button id="clear-btn" class="plan-btn secondary full-width">Clear cart</button>
        </aside>
    </div>
</div>

</div>
<script>
(function(){
    const htmlEl=document.documentElement;
    const toggle=document.getElementById('theme-toggle');
    const saved=localStorage.getItem('theme');
    const prefersDark=window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    const initial=saved || (prefersDark ? 'dark' : 'light');
    htmlEl.setAttribute('data-theme', initial);
    toggle.innerHTML = initial==='light' ? '☀️' : '🌙';
    toggle.addEventListener('click', ()=>{
        const current=htmlEl.getAttribute('data-theme');
        const next = current==='light' ? 'dark' : 'light';
        htmlEl.setAttribute('data-theme', next); localStorage.setItem('theme', next); toggle.innerHTML = next==='light' ? '☀️' : '🌙';
    });
})();

function getCart(){try{return JSON.parse(localStorage.getItem('tech_cart')||'[]');}catch(e){return []}}
function saveCart(c){localStorage.setItem('tech_cart',JSON.stringify(c));}
function parsePrice(p){ if(!p) return 0; const m = p.replace(/[^0-9.]/g,''); return parseFloat(m)||0 }
function showToast(msg, timeout=2200){ const t = document.getElementById('toast'); if(!t) return; t.textContent=msg; t.style.display='block'; t.style.opacity='1'; setTimeout(()=>{ t.style.transition='opacity 300ms'; t.style.opacity='0'; setTimeout(()=>{ t.style.display='none'; t.style.transition=''; },300); }, timeout); }

function render(){
    const list = document.getElementById('cart-list'); list.innerHTML='';
    const cart = getCart();
    let total = 0;
    if(!cart.length){
        list.innerHTML = '<div style="color:var(--muted);padding:18px;border:1px dashed rgba(255,255,255,0.2);border-radius:12px">Your cart is empty. Add services from the services page to continue.</div>';
    } else {
        cart.forEach((it,idx)=>{
            const tr = document.createElement('div'); tr.className='item';
            const meta = document.createElement('div'); meta.className='meta'; meta.innerHTML = '<strong>'+it.name+'</strong><div style="color:var(--muted)">'+it.price+'</div>';
            const actions = document.createElement('div'); actions.className='actions';
            const rem = document.createElement('button'); rem.textContent='Remove'; rem.className='button'; rem.onclick=()=>{ cart.splice(idx,1); saveCart(cart); render(); };
            actions.appendChild(rem);
            tr.appendChild(meta); tr.appendChild(actions);
            list.appendChild(tr);
            total += parsePrice(it.price);
        });
    }
    document.getElementById('cart-total').textContent = '₹'+Math.round(total);
    document.getElementById('summary-count').textContent = cart.length + (cart.length === 1 ? ' item' : ' items');
    document.getElementById('checkout-btn').disabled = !cart.length;
}

render();

document.getElementById('clear-btn').addEventListener('click', ()=>{ localStorage.removeItem('tech_cart'); render(); showToast('Cart cleared'); });

document.getElementById('checkout-btn').addEventListener('click', ()=>{
    const cart = getCart(); if(!cart.length){ showToast('Cart is empty'); return; }
    const customerName = document.getElementById('customer-name').value.trim();
    const customerEmail = document.getElementById('customer-email').value.trim();
    const customerCompany = document.getElementById('customer-company').value.trim();
    const customerPhone = document.getElementById('customer-phone').value.trim();
    const customerNotes = document.getElementById('customer-notes').value.trim();
    if(!customerName){ showToast('Please enter your name'); return; }
    if(!customerEmail || !/^\S+@\S+\.\S+$/.test(customerEmail)){ showToast('Please enter a valid email'); return; }
    let total = 0;
    let orderDetails = '';
    cart.forEach((it,idx)=>{ orderDetails += (idx+1)+'. '+it.name+' - '+it.price+'\n'; total += parsePrice(it.price); });
    const orderTotal = '₹'+Math.round(total);
    const emailBody = [];
    emailBody.push('Customer name: ' + customerName);
    emailBody.push('Customer email: ' + customerEmail);
    emailBody.push('Company: ' + (customerCompany||'N/A'));
    emailBody.push('Phone: ' + (customerPhone||'N/A'));
    emailBody.push('\nSelected services:');
    emailBody.push(orderDetails);
    emailBody.push('\nTotal: ' + orderTotal);
    if(customerNotes) emailBody.push('\nNotes: ' + customerNotes);
    emailBody.push('\n---\nThis request was generated from the Technostic Group checkout page.');

    // save current order so confirmation page can display it
    const lastOrder = {
        customer_name: customerName,
        customer_email: customerEmail,
        customer_company: customerCompany || 'N/A',
        customer_phone: customerPhone || 'N/A',
        customer_notes: customerNotes || '',
        order_details: orderDetails,
        order_total: orderTotal,
        created_at: new Date().toISOString()
    };
    // save last order
    try{ localStorage.setItem('last_order', JSON.stringify(lastOrder)); }catch(e){}
    // clear cart client-side now
    localStorage.removeItem('tech_cart');
    render();

    // send email via Formspree
    const formspreeData = {
        name: customerName,
        email: customerEmail,
        company: customerCompany || 'N/A',
        phone: customerPhone || 'N/A',
        services: orderDetails,
        total: orderTotal,
        notes: customerNotes || '',
        message: emailBody.join('\n')
    };

    fetch('https://formspree.io/f/mbdegblw', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formspreeData)
    })
    .then(res => {
        console.log('Email sent to Formspree');
        // redirect to confirmation page after email sent
        window.location.href = 'order-confirmation.html';
    })
    .catch(err => {
        console.warn('Formspree error:', err);
        // still redirect even if email fails
        window.location.href = 'order-confirmation.html';
    });
});
</script>
</body>
</html>
